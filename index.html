<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #050505; --card-bg: #121212; --border-color: #2a2a2a; --accent-green: #10b981; --text-main: #f3f4f6; --text-muted: #9ca3af; --cell-bg: #1a1a1a; --cell-border: #333; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1400px; display: flex; flex-direction: column; gap: 20px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .view-container { display: none; flex-direction: column; gap: 20px; }
        .view-container.active { display: flex; }
        button { background-color: transparent; color: var(--text-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; cursor: pointer; }
        button.primary { background-color: var(--accent-green); color: #000; border: none; }
        .search-row { display: flex; gap: 10px; position: relative; }
        input[type="text"] { flex: 1; background-color: #0a0a0a; border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 8px; }
        .matrix-grid { display: grid; grid-template-columns: 80px repeat(18, minmax(60px, 1fr)); gap: 6px; min-width: 1000px; }
        .cell { background-color: var(--cell-bg); border: 1px solid var(--cell-border); border-radius: 6px; height: 40px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-new-round" class="view-container active">
        <div class="card">
            <div class="search-row">
                <input type="text" id="course-search-input" placeholder="e.g., McKenzie Meadows" autocomplete="off">
                <button class="primary" id="course-search-btn">Fetch</button>
            </div>
            <div id="api-status" style="margin-top: 10px; font-size: 12px; color: var(--accent-green);"></div>
        </div>
        <div class="card">
            <h3 id="current-course-display">SELECT COURSE</h3>
            <div class="matrix-grid" id="scorecard-grid"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://hksccpousgspagkqcjzd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KLpYENB7bIa_8SkAWN90uA_12BcxJKC"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentCoursePars = Array(18).fill(""); 

    // Fetches course with wildcards to find matches successfully
    async function fetchCourseDetails() {
        const query = document.getElementById('course-search-input').value.trim();
        const statusText = document.getElementById('api-status');
        const displayTitle = document.getElementById('current-course-display');
        
        statusText.innerText = "⏳ Loading course from database...";

        try {
            const { data, error } = await supabaseClient
                .from('course_directory')
                .select('course_name, pars')
                .ilike('course_name', `%${query}%`) // Wildcards enabled for broader search
                .limit(1);

            if (error) throw error;

            if (data && data.length > 0) {
                const course = data[0];
                currentCoursePars = [...course.pars];
                displayTitle.innerText = course.course_name.toUpperCase();
                statusText.innerText = `✅ Loaded ${course.course_name.toUpperCase()}.`;
                buildGrid();
                return;
            }
        } catch(e) {
            console.error("Supabase fetch error:", e);
        }

        displayTitle.innerText = query.toUpperCase();
        statusText.innerText = "ℹ️ Course layout not found. Please enter pars manually below.";
        currentCoursePars = Array(18).fill(""); 
        buildGrid();
    }

    function buildGrid() {
        const grid = document.getElementById('scorecard-grid');
        grid.innerHTML = ''; 
        const rows = [{ label: 'HOLE', type: 'header' }, { label: 'PAR', type: 'par' }];

        rows.forEach(row => {
            const labelCell = document.createElement('div');
            labelCell.className = 'row-label';
            labelCell.innerText = row.label;
            grid.appendChild(labelCell);

            for (let i = 0; i < 18; i++) {
                const cell = document.createElement('div');
                if (row.type === 'header') {
                    cell.className = 'cell';
                    cell.innerText = i + 1;
                } else {
                    cell.className = 'cell';
                    cell.innerHTML = `<input type="number" value="${currentCoursePars[i] ?? ''}">`;
                }
                grid.appendChild(cell);
            }
        });
    }

    document.getElementById('course-search-btn').addEventListener('click', fetchCourseDetails);
    document.addEventListener('DOMContentLoaded', buildGrid);
</script>
</body>
</html>
