<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-black text-zinc-100 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- COURSE INTELLIGENCE -->
        <section class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4">Course Intelligence</h2>
            <div class="flex gap-2 mb-4">
                <input id="course-search" class="flex-1 bg-black border border-zinc-700 p-3 rounded-lg text-sm" placeholder="Enter course name...">
                <button onclick="fetchCourseData()" class="bg-emerald-500 text-black font-black px-6 py-3 rounded-lg text-xs uppercase">Fetch</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input id="rating-val" placeholder="Rating" class="bg-black border border-zinc-700 p-2 rounded text-emerald-400 font-mono">
                <input id="slope-val" placeholder="Slope" class="bg-black border border-zinc-700 p-2 rounded text-emerald-400 font-mono">
            </div>
        </section>

        <!-- SCORECARD GRID -->
        <section class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <div id="scorecard-grid" class="grid grid-cols-9 gap-2 mb-6">
                <!-- 18 Inputs -->
                <script>
                    for(let i=1; i<=18; i++) {
                        document.write(`<input id="s${i}" placeholder="${i}" class="bg-black border border-zinc-700 p-2 text-center rounded text-xs">`);
                    }
                </script>
            </div>
            <button onclick="saveRound()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-lg uppercase text-xs">Sync Round</button>
        </section>
    </div>

    <script>
        function fetchCourseData() {
            const query = document.getElementById('course-search').value.toLowerCase();
            // Local fallback logic
            const cache = { "blue devil": { rating: 74.4, slope: 138 } };
            if (cache[query]) {
                document.getElementById('rating-val').value = cache[query].rating;
                document.getElementById('slope-val').value = cache[query].slope;
            }
        }

        function saveRound() {
            const rating = parseFloat(document.getElementById('rating-val').value);
            const slope = parseInt(document.getElementById('slope-val').value);
            const scores = Array.from({length: 18}, (_, i) => parseInt(document.getElementById(`s${i+1}`).value) || 0);
            const total = scores.reduce((a, b) => a + b, 0);
            
            if (total > 0 && rating > 0) {
                const diff = (total - rating) * 113 / slope;
                alert(`Round Saved! Total: ${total}, Differential: ${diff.toFixed(1)}`);
            } else {
                alert("Please enter a valid course rating and score.");
            }
        }
    </script>
</body>
</html>
