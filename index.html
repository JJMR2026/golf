<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-4 bg-black text-zinc-100 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- SEARCH & AUTO-POPULATE SECTION -->
        <section class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4">Course Intelligence</h2>
            <div class="flex gap-2 mb-4">
                <input id="course-search" class="flex-1 bg-black border border-zinc-700 p-3 rounded-lg text-sm" placeholder="Enter course name...">
                <button onclick="fetchCourseData()" class="bg-emerald-500 text-black font-black px-6 py-3 rounded-lg text-xs uppercase">Fetch Data</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] text-zinc-500 uppercase">Auto-Detected Rating</label>
                    <input id="rating-val" readonly class="w-full bg-black border border-zinc-800 p-2 rounded text-emerald-400 font-mono">
                </div>
                <div>
                    <label class="text-[9px] text-zinc-500 uppercase">Auto-Detected Slope</label>
                    <input id="slope-val" readonly class="w-full bg-black border border-zinc-800 p-2 rounded text-emerald-400 font-mono">
                </div>
            </div>
        </section>

        <!-- HANDICAP MONITOR -->
        <section class="bg-zinc-950 p-6 rounded-2xl border border-emerald-900/30 text-center">
            <h2 class="text-[10px] text-zinc-500 uppercase">Handicap Index</h2>
            <div id="hcp-index" class="text-5xl font-black text-white mt-1">--</div>
        </section>
    </div>

    <script>
        // Fetch logic that populates rating/slope automatically
        async function fetchCourseData() {
            const query = document.getElementById('course-search').value;
            // Simulated API call structure
            try {
                const response = await fetch(`https://api.opengolfapi.org/v1/courses/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if(data.courses.length > 0) {
                    const course = data.courses[0];
                    document.getElementById('rating-val').value = course.rating || 72.0;
                    document.getElementById('slope-val').value = course.slope || 113;
                    updateHandicap();
                }
            } catch(e) {
                alert("Could not auto-fetch data. Defaulting to standard ratings.");
                document.getElementById('rating-val').value = 72.0;
                document.getElementById('slope-val').value = 113;
            }
        }

        // Handicap math engine
        function updateHandicap() {
            // Logic: (Score - Rating) * 113 / Slope
            // This would trigger whenever a new round is added
            console.log("Handicap recalibrated.");
        }
    </script>
</body>
</html>
