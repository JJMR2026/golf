<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tracker</title>
    <!-- Include Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- GLOBAL & LAYOUT --- */
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --border-color: #2a2a2a;
            --accent-green: #10b981;
            --accent-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --cell-bg: #1a1a1a;
            --cell-border: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1400px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        /* --- VIEW ROUTING --- */
        .view-container {
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.3s ease;
        }

        .view-container.active {
            display: flex; /* Only active view shows */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- BUTTONS & INPUTS --- */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        button {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            flex: 1;
        }

        button:hover { background-color: #1f1f1f; }
        
        button.primary, button.nav-btn.active {
            background-color: var(--accent-green);
            color: #000;
            border: none;
        }
        button.primary:hover, button.nav-btn.active:hover { background-color: var(--accent-hover); }

        .search-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #0a0a0a;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
        }

        /* --- SCORECARD MATRIX --- */
        .scorecard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .scorecard-header h3 {
            margin: 0;
            color: var(--accent-green);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .badge {
            background-color: #1f1f1f;
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
        }

        .matrix-wrapper {
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: 80px repeat(18, minmax(60px, 1fr));
            gap: 6px;
            min-width: 1000px;
        }

        .row-label {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .cell {
            background-color: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 6px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .cell.hole-header { background-color: #111; color: var(--text-muted); border: none; }

        .cell input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            outline: none;
        }

        .cell input:focus {
            background-color: #222;
            border-radius: 6px;
        }

        .cell.drive-cell input:disabled {
            color: #333;
            cursor: not-allowed;
            background-color: #141414;
        }
        .cell.drive-cell.disabled { opacity: 0.5; }

        .toggle-btn {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            border-radius: 6px;
        }
        .toggle-btn.hit { color: var(--accent-green); }

        .log-btn-container {
            margin-top: 25px;
            display: flex;
        }

        /* --- DATA MANAGEMENT --- */
        .data-management {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-management h4 { margin: 0; color: var(--text-muted); font-size: 12px; }
        .danger-btn { color: #ef4444; border-color: #ef4444; }
        .danger-btn:hover { background-color: rgba(239, 68, 68, 0.1); }
        
        /* --- HISTORY LIST --- */
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .history-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- NAVIGATION -->
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="switchView('view-new-round', this)">New Round</button>
        <button class="nav-btn" onclick="switchView('view-history', this)">History</button>
        <button class="nav-btn" onclick="switchView('view-analytics', this)">Analytics</button>
    </div>

    <!-- ==================== NEW ROUND VIEW ==================== -->
    <div id="view-new-round" class="view-container active">
        <!-- COURSE SEARCH -->
        <div class="card">
            <div style="font-size: 12px; color: var(--text-muted); font-weight: bold; text-transform: uppercase;">
                🔍 Select or Fetch Golf Course
            </div>
            <div class="search-row">
                <input type="text" id="course-search-input" placeholder="e.g., Blue Devil">
                <button class="primary" id="course-search-btn" style="flex: 0 0 auto;">Fetch</button>
            </div>
            <div id="api-status" style="margin-top: 10px; font-size: 12px; color: var(--accent-green);"></div>
        </div>

        <!-- SCORECARD MATRIX -->
        <div class="card">
            <div class="scorecard-header">
                <h3 id="current-course-display">STANDARD 18 LAYOUT</h3>
                <div class="badge">18 HOLES</div>
            </div>

            <div class="matrix-wrapper">
                <div class="matrix-grid" id="scorecard-grid">
                    <!-- Grid injected via JS -->
                </div>
            </div>

            <div class="log-btn-container">
                <button class="primary" style="width: 100%; padding: 16px; font-size: 16px;" onclick="logScorecard()">
                    COMPLETE & LOG SCORECARD →
                </button>
            </div>
        </div>

        <!-- DATA MANAGEMENT -->
        <div class="card data-management">
            <h4>⚙️ LOCAL DATA MANAGEMENT</h4>
            <div style="display: flex; gap: 10px;">
                <button>📊 Export CSV</button>
                <button class="danger-btn">🗑️ Wipe Storage</button>
            </div>
        </div>
    </div>

    <!-- ==================== HISTORY VIEW ==================== -->
    <div id="view-history" class="view-container">
        <div class="card">
            <div class="scorecard-header">
                <h3>ROUND HISTORY</h3>
                <div class="badge" style="background: #2563eb; color: white; border: none;">SUPABASE SYNCED</div>
            </div>
            <div id="history-list">
                <!-- Placeholder items waiting for Supabase logic -->
                <div class="history-item">
                    <div>
                        <strong>Blue Devil</strong><br>
                        <span style="font-size: 12px; color: var(--text-muted);">July 4, 2026</span>
                    </div>
                    <div style="text-align: right;">
                        <strong>Score: 82</strong><br>
                        <span style="font-size: 12px; color: var(--text-muted);">Diff: 9.2</span>
                    </div>
                </div>
                <div class="history-item">
                    <div>
                        <strong>Banff Springs</strong><br>
                        <span style="font-size: 12px; color: var(--text-muted);">June 18, 2026</span>
                    </div>
                    <div style="text-align: right;">
                        <strong>Score: 88</strong><br>
                        <span style="font-size: 12px; color: var(--text-muted);">Diff: 14.1</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== ANALYTICS VIEW ==================== -->
    <div id="view-analytics" class="view-container">
        <div class="card">
            <div class="scorecard-header">
                <h3>PERFORMANCE ANALYTICS</h3>
            </div>
            <!-- Chart.js Canvas -->
            <div style="position: relative; height: 400px; width: 100%;">
                <canvas id="scoringChart"></canvas>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card">
                <h4 style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 12px;">AVG DRIVE DISTANCE</h4>
                <div style="font-size: 32px; font-weight: bold; color: var(--accent-green);">264 <span style="font-size: 16px; color: var(--text-muted);">YDS</span></div>
            </div>
            <div class="card">
                <h4 style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 12px;">GIR PERCENTAGE</h4>
                <div style="font-size: 32px; font-weight: bold; color: #3b82f6;">42 <span style="font-size: 16px; color: var(--text-muted);">%</span></div>
            </div>
        </div>
    </div>

</div>

<script>
    // --- VIEW ROUTING LOGIC ---
    let chartInstance = null;

    function switchView(viewId, btnElement) {
        // Hide all views
        document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
        // Remove active class from all nav buttons
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        
        // Show target view & set active button
        document.getElementById(viewId).classList.add('active');
        btnElement.classList.add('active');

        // Initialize chart only when Analytics view is opened
        if (viewId === 'view-analytics' && !chartInstance) {
            initChart();
        }
    }

    // --- CHART.JS INITIALIZATION (Analytics Placeholder) ---
    function initChart() {
        const ctx = document.getElementById('scoringChart').getContext('2d');
        
        // Ensure chart styling matches the dark theme
        Chart.defaults.color = '#9ca3af';
        Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['May 1', 'May 15', 'Jun 2', 'Jun 10', 'Jun 18', 'Jun 26', 'Jul 4'],
                datasets: [{
                    label: 'Gross Score',
                    data: [94, 91, 89, 92, 85, 88, 82], 
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#121212',
                    pointBorderColor: '#10b981',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        grid: { color: '#2a2a2a' },
                        suggestedMin: 70,
                        suggestedMax: 100
                    },
                    x: {
                        grid: { display: false }
                    }
                }
            }
        });
    }

    // --- STATE MANAGEMENT ---
    const globalCourseDatabase = {
        "blue devil": [4,4,4,5,3,4,3,4,5,4,4,3,4,4,5,3,5,4],
        "banff springs": [4,3,5,4,4,4,4,3,5,4,4,4,3,4,5,4,3,4],
        "glenabbey": [4,4,3,4,5,4,3,4,4,4,4,3,5,4,4,4,3,5]
    };

    let currentCoursePars = [4,4,3,4,4,4,5,3,4,4,4,3,5,4,4,3,4,5]; // Default Par 72

    // --- COURSE FETCH LOGIC (Canadian API Targeted) ---
    async function fetchCourseDetails() {
        const query = document.getElementById('course-search-input').value.toLowerCase().trim();
        const statusText = document.getElementById('api-status');
        const displayTitle = document.getElementById('current-course-display');
        
        if(!query) return;
        statusText.innerText = "⏳ Querying Canadian course databases...";

        // 1. Offline Local Cache check
        let foundKey = Object.keys(globalCourseDatabase).find(key => query.includes(key) || key.includes(query));
        if(foundKey) {
            currentCoursePars = [...globalCourseDatabase[foundKey]];
            displayTitle.innerText = foundKey.toUpperCase();
            statusText.innerText = `✅ Loaded ${foundKey.toUpperCase()} from local cache.`;
            buildGrid();
            return;
        }

        // 2. Network Endpoint (Configured for Canadian Database)
        try {
            const res = await fetch(`https://api.golfdata.ca/v1/courses/search?q=${encodeURIComponent(query)}`);
            if (res.ok) {
                const data = await res.json();
                if(data && data.courses && data.courses.length > 0) {
                    const course = data.courses[0];
                    displayTitle.innerText = course.name.toUpperCase();
                    statusText.innerText = `✅ Found ${course.name} via network!`;
                    if(course.pars && course.pars.length === 18) {
                        currentCoursePars = [...course.pars];
                    }
                    buildGrid();
                    return;
                }
            }
        } catch(e) {
            console.log("Canadian API offline or error", e);
        }

        // 3. Fallback
        displayTitle.innerText = query.toUpperCase();
        statusText.innerText = "⚠️ Course not found. Default Par 72 loaded.";
        currentCoursePars = [4,4,3,4,4,4,5,3,4,4,4,3,5,4,4,3,4,5]; 
        buildGrid();
    }

    // --- GRID GENERATION & LOGIC ---
    function buildGrid() {
        const grid = document.getElementById('scorecard-grid');
        grid.innerHTML = ''; 

        const rows = [
            { label: 'HOLE', type: 'header' },
            { label: 'PAR', type: 'par' },
            { label: 'SCORE', type: 'input' },
            { label: 'PUTTS', type: 'input' },
            { label: 'FIR', type: 'toggle' },
            { label: 'GIR', type: 'toggle' },
            { label: 'DRIVE (YDS)', type: 'drive' } 
        ];

        rows.forEach(row => {
            const labelCell = document.createElement('div');
            labelCell.className = 'row-label';
            labelCell.innerText = row.label;
            grid.appendChild(labelCell);

            for (let i = 0; i < 18; i++) {
                const cell = document.createElement('div');
                
                if (row.type === 'header') {
                    cell.className = 'cell hole-header';
                    cell.innerText = i + 1;
                } 
                else if (row.type === 'par') {
                    cell.className = 'cell';
                    // Par is now a visible, editable number input box
                    cell.innerHTML = `<input type="number" id="par-input-${i}" value="${currentCoursePars[i]}" min="3" max="5" onchange="updatePar(${i}, this.value)">`;
                }
                else if (row.type === 'input') {
                    cell.className = 'cell';
                    cell.innerHTML = `<input type="number" min="1" max="20" placeholder="-">`;
                }
                else if (row.type === 'toggle') {
                    cell.className = 'cell';
                    cell.innerHTML = `<button class="toggle-btn" onclick="toggleHit(this)">MISS</button>`;
                }
                else if (row.type === 'drive') {
                    cell.className = 'cell drive-cell';
                    cell.id = `drive-container-${i}`;
                    cell.innerHTML = `<input type="number" id="drive-input-${i}" placeholder="yds">`;
                }
                
                grid.appendChild(cell);
            }
        });

        updateDriveDistances();
    }

    // Handlers for the Par textbox change
    function updatePar(index, val) {
        let newPar = parseInt(val);
        // Constrain the numbers so mobile users can't type Par 99
        if (isNaN(newPar) || newPar < 3) newPar = 3;
        if (newPar > 5) newPar = 5;
        
        currentCoursePars[index] = newPar;
        document.getElementById(`par-input-${index}`).value = newPar; // Snap UI back if out of bounds
        
        updateDriveDistances();
    }

    function toggleHit(btn) {
        if (btn.innerText === "MISS") {
            btn.innerText = "HIT";
            btn.classList.add("hit");
        } else {
            btn.innerText = "MISS";
            btn.classList.remove("hit");
        }
    }

    function updateDriveDistances() {
        for (let i = 0; i < 18; i++) {
            const input = document.getElementById(`drive-input-${i}`);
            const container = document.getElementById(`drive-container-${i}`);
            
            if (currentCoursePars[i] === 3) {
                input.value = ""; 
                input.disabled = true;
                input.placeholder = "N/A";
                container.classList.add("disabled");
            } else {
                input.disabled = false;
                input.placeholder = "yds";
                container.classList.remove("disabled");
            }
        }
    }

    // --- DATA AGGREGATION & STATS ---
    function logScorecard() {
        let totalDriveDist = 0;
        let validDrives = 0;

        for (let i = 0; i < 18; i++) {
            if (currentCoursePars[i] > 3) {
                const driveVal = document.getElementById(`drive-input-${i}`).value;
                if (driveVal && !isNaN(driveVal)) {
                    totalDriveDist += parseInt(driveVal);
                    validDrives++;
                }
            }
        }

        const avgDrive = validDrives > 0 ? Math.round(totalDriveDist / validDrives) : 0;
        
        console.log("--- ROUND STATS ---");
        console.log(`Valid Drives Logged: ${validDrives}`);
        console.log(`Average Drive Distance: ${avgDrive} yds`);
        alert(`Scorecard ready for sync!\nCalculated Average Drive: ${avgDrive || 'N/A'} yds`);
    }

    // Initialization Events
    document.getElementById('course-search-btn').addEventListener('click', fetchCourseDetails);
    document.getElementById('course-search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchCourseDetails();
    });

    document.addEventListener('DOMContentLoaded', buildGrid);

</script>
</body>
</html>
