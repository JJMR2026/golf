<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="p-4 bg-black text-zinc-100 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- COURSE INTELLIGENCE -->
        <section class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4">Course Intelligence</h2>
            <div class="flex gap-2 mb-4">
                <input id="course-search" class="flex-1 bg-black border border-zinc-700 p-3 rounded-lg text-sm" placeholder="Search course...">
                <button onclick="fetchCourseData()" class="bg-emerald-500 text-black font-black px-6 py-3 rounded-lg text-xs uppercase">Fetch</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input id="rating-val" placeholder="Rating" class="bg-black border border-zinc-700 p-2 rounded text-emerald-400">
                <input id="slope-val" placeholder="Slope" class="bg-black border border-zinc-700 p-2 rounded text-emerald-400">
            </div>
        </section>

        <!-- SCORECARD GRID -->
        <section class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <div id="scorecard-grid" class="grid grid-cols-6 md:grid-cols-9 gap-2 mb-6">
                <script>
                    for(let i=1; i<=18; i++) {
                        document.write(`<input id="s${i}" placeholder="${i}" class="bg-black border border-zinc-700 p-2 text-center rounded text-sm">`);
                    }
                </script>
            </div>
            <button onclick="saveRound()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-lg uppercase text-xs">Sync Round</button>
        </section>

        <!-- ANALYTICS & HISTORY -->
        <section class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <canvas id="scoreChart"></canvas>
        </section>
    </div>

    <script>
        // Core logic for Supabase sync, Chart.js initialization, and Garmin CSV import
        function fetchCourseData() { /* Logic for API lookup */ }
        function saveRound() { /* Logic for Supabase sync */ }
        
        // Initialize Chart
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ data: [] }] } });
    </script>
</body>
</html>
