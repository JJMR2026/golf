name: Automated Golf Course Harvester

# Triggers the workflow every night at 2:00 AM UTC (8:00 PM MDT)
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  harvest-courses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Run Harvester Script
        env:
          # These secrets must be added to your GitHub repo settings
          GOLF_API_KEY: ${{ secrets.GOLF_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_bot.py
